apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: ts
data:
  host.conf: |
    server {
        listen 80;
        server_name localhost;

        location / {
            root /tmp/nginx/html;
            index index.html index.htm;
        }

        error_log /var/log/nginx/error.log warn;
        access_log /var/log/nginx/access.log main;
    }