apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-king
  namespace: ts
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: king-deployment
  minReplicas: 1
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80